# --- Anasayfa "Önemli Tarihler" (BÜ akademik takviminden) ----------------
# Her satır YA tek bir gün YA da bir tarih aralığı olabilir:
#   tek gün -> { tarih: "15 Ekim 2026", baslik: "...", kategori: ... }
#   aralık  -> { baslangic: "22 Haziran", bitis: "10 Ağustos", baslik: "...", kategori: ... }
# kategori (satırın sol renk şeridi): akademik (lacivert) | staj (mavi) |
#                                     teslim (amber) | tatil (yeşil)
# Sıralama burada nasılsa sayfada da öyle görünür → kronolojik yazın.
# Tarih henüz belli değilse: { tarih: "Güncellenecektir", ... }
# Geçici/tahmini tarihe küçük alt not: { ..., notu: "Akademik takvim açıklanınca güncellenecektir" }
#
# --- Yıl şeridi (anasayfa görsel zaman çizelgesi) -------------------------
# Şerit HER ZAMAN bu yılın Ocak–Aralık'ını gösterir (sabit eksen):
takvim_yil: 2026
# staj_durum (yıl şeridini VE alttaki tarih listesini renklendirir):
#   kapali  -> ders dönemi, staj YAPILAMAZ (Bahar, Güz)     → koyu mavi
#   kosullu -> Yaz Okulu; ders almıyorsan staj yapılabilir  → açık mavi (tırtıklı)
#   (alan hiç yoksa o aralık "staj yapılabilir" = dolgun mavi; aralar otomatik mavi kalır; teslim = gold)
takvim:
  - {
      baslangic: "9 Şubat 2026",
      bitis: "15 Mayıs 2026",
      baslik: "Bahar Dönemi",
      kategori: "akademik",
      staj_durum: "kapali",
    }
  - {
      baslangic: "24 Haziran 2026",
      bitis: "12 Ağustos 2026",
      baslik: "Yaz Okulu",
      kategori: "akademik",
      staj_durum: "kosullu",
    }
  - {
      baslangic: "21 Eylül 2026",
      bitis: "31 Aralık 2026",
      baslik: "Güz Dönemi",
      kategori: "akademik",
      staj_durum: "kapali",
      notu: "Bitiş tarihi akademik takvim kesinleşince güncellenecek",
    }
  - {
      tarih: "12 Ekim 2026",
      baslik: "Staj Raporu Teslim Son Günü",
      kategori: "teslim",
    }
