# ============================================================================
#  SİTE AYARLARI — iletişim, bağlantılar ve takvim içeriği burada.
#  donem altındaki kampanya alanları Shared/campaign.yml kaynağından üretilir;
#  doğrudan değiştirmeyin. Güvenli yayın sırası için DEPLOYMENT.md'ye bakın.
# ============================================================================

# --- Üretilen güncel dönem & tarihler ------------------------------------
donem:
  # Portal → değerlendirme → veritabanı boyunca değişmeyen sözleşme kimliği.
  contract_version: 1
  campaign_id: "2026-summer"
  etiket: "2026 Yaz" # güncel dönem (sitede görünür)
  year_done: 2026
  semester: "Summer"
  staj_baslangic: "2026-06-16"
  staj_bitis: "2026-09-12"

  # SON TESLİM (zamanında) — tarih + SAAT (+03:00). Biçim: "YYYY-AA-GG SS:DD"
  # Örn: "2026-10-15 23:59". Bu tarihten SONRA form kapanmaz; aşağıdaki
  # gec_teslim_gun kadar gün daha "geç teslim" olarak açık kalır (uyarı + ceza).
  # Boş ("") = kilit kapalı.
  teslim_kilit: "2026-10-12 10:00"

  # GEÇ TESLİM PENCERESİ — son teslimden sonra kaç GÜN daha yükleme kabul edilir.
  # Başlayan her 24 saat 1 geç gün sayılır; her geç gün staj süresinden 1 iş günü
  # düşer. Bu sürenin sonunda online yükleme kapanır. 0 = geç teslim yok.
  gec_teslim_gun: 10

